version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "Setting up environment variables..."
        - env | grep '^NEXT_PUBLIC_' > .env.production || true
        - if [ -z "$API_URL" ]; then echo "ERROR: API_URL not set"; exit 1; fi
        - echo "API_URL=$API_URL" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*